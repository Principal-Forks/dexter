    color: "#FF9800"
    shape: "rectangle"
    
  TaskExecutor:
    description: "Executes planned tasks using available tools"
    icon: "⚡"
    color: "#9C27B0"
    shape: "rectangle"
    
  AnswerGenerator:
    description: "Generates final answers from task results"
    icon: "💡"
    color: "#F44336"
    shape: "rectangle"
    
  LLM:
    description: "Language model interface"
    icon: "🧠"
    color: "#00BCD4"
    shape: "circle"
    
  FinanceTools:
    description: "Financial data analysis tools"
    icon: "📊"
    color: "#795548"
    shape: "hexagon"
    
  SearchTools:
    description: "Web search capabilities"
    icon: "🔍"
    color: "#607D8B"
    shape: "hexagon"
    
  MessageHistory:
    description: "Conversation history management"
    icon: "📚"
    color: "#FFC107"
    shape: "rectangle"
    
  Config:
    description: "Configuration and settings management"
    icon: "⚙️"
    color: "#9E9E9E"
