version: "1.0.0"
name: "Dexter AI Agent Architecture"

nodeComponents:
  CLI:
    description: "Main CLI application entry point"
    icon: "🖥️"
    color: "#4CAF50"
    shape: "rectangle"
    
  Agent:
    description: "Main AI agent orchestrator"
    icon: "🤖"
    color: "#2196F3"
    shape: "rectangle"
    
  TaskPlanner:
    description: "Plans and breaks down tasks into subtasks"
