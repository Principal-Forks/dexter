  queries:
    description: "Queries for data"
    style: "solid"
    color: "#9C27B0"
    
  stores:
    description: "Stores data in"
    style: "solid"
    color: "#F44336"
    
  configures:
    description: "Configures behavior"
    style: "dotted"
    color: "#607D8B"
    
  streams:
    description: "Streams data to"
    style: "solid"
    color: "#00BCD4"